version: "3"

services:
  # ─────────────────────────────────────────────
  # VPN Tunnel (ProtonVPN WireGuard via Gluetun)
  # ─────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      # Credentials loaded from .env (never committed to git)
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      # Server selection — use either SERVER_COUNTRIES or SERVER_NAMES
      # SERVER_COUNTRIES is simpler (e.g. "Netherlands")
      # SERVER_NAMES allows a specific server (e.g. "NL#100")
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES:-Netherlands}
      # SERVER_NAMES: ${VPN_SERVER_NAMES:-}
      # MTU — gluetun auto-discovers, but you can pin it (1400-1420 typical)
      MTU: ${VPN_MTU:-1420}
      # Disable secure core for lower latency (enable for maximum privacy)
      SECURE_CORE: ${VPN_SECURE_CORE:-off}
    ports:
      - "5030:5030"   # slskd web UI (through VPN)
      - "5031:5031"   # slskd HTTPS (through VPN)
    # Memory limits — see note below
    # mem_limit: 256m
    # memswap_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Soulseek Client (routed through VPN)
  # ─────────────────────────────────────────────
  slskd:
    image: slskd/slskd:latest
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      SLSKD_REMOTE_CONFIGURATION: "true"
    volumes:
      - "./slskd-data:/app"
      - "/path/to/your/music:/music"
      - "/path/to/your/downloads:/downloads"
    # Memory limits — see note below
    # mem_limit: 256m
    # memswap_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Music Streaming Server (direct network, no VPN)
  # ─────────────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    ports:
      - "4533:4533"
    environment:
      ND_SCANSCHEDULE: 15m
      ND_LOGLEVEL: info
    volumes:
      - "./data:/data"
      - "/path/to/your/music:/music:ro"
    restart: unless-stopped

# ─────────────────────────────────────────────
# Notes
# ─────────────────────────────────────────────
# Memory limits: mem_limit / memswap_limit are supported by Docker
# but require cgroups memory support in the kernel. 32-bit kernels
# (e.g. armv7l Raspbian) may not have this enabled — Docker will
# silently ignore the limits in that case.
#
# Kill switch: Gluetun includes a built-in kill switch. If the VPN
# tunnel drops, all outbound traffic from the container is blocked,
# preventing slskd from leaking your real IP address.
#
# Credential management: Copy .env.example to .env and fill with your
# ProtonVPN WireGuard credentials. The .env file is gitignored and
# never committed to the repository.